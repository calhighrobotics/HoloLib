<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 320" width="680" height="320" role="img" aria-label="moveToPose drives to an X, Y coordinate and finishes at a target heading at the same time">
  <style>
    text { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .lbl { font-size: 13px; fill: #20203c; font-weight: 600; }
    .sub { font-size: 12px; fill: #5a5a6e; }
    .ax  { font-size: 12px; fill: #8888a0; font-weight: 600; }
  </style>
  <defs>
    <marker id="mp_mv" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b54e6"/>
    </marker>
    <marker id="mp_ax" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8888a0"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="678" height="318" rx="16" fill="#ffffff" stroke="#e7e6fb" stroke-width="2"/>
  <rect x="40" y="40" width="600" height="232" rx="10" fill="#f7f7fb" stroke="#dcdcec" stroke-width="1.6"/>

  <!-- axes -->
  <line x1="70" y1="252" x2="70" y2="196" stroke="#8888a0" stroke-width="1.6" marker-end="url(#mp_ax)"/>
  <line x1="70" y1="252" x2="124" y2="252" stroke="#8888a0" stroke-width="1.6" marker-end="url(#mp_ax)"/>
  <text class="ax" x="62" y="192" text-anchor="end">Y</text>
  <text class="ax" x="130" y="256">X</text>

  <!-- travel curve -->
  <path d="M150,210 C260,210 360,150 470,110" fill="none" stroke="#5b54e6" stroke-width="3" stroke-dasharray="2 6" stroke-linecap="round"/>

  <!-- start robot (facing up) -->
  <g transform="translate(150,210)">
    <rect x="-9" y="-4" width="18" height="8" rx="3" fill="#9a96e8" transform="translate(-20,-20) rotate(-45)"/>
    <rect x="-9" y="-4" width="18" height="8" rx="3" fill="#9a96e8" transform="translate(20,-20) rotate(45)"/>
    <rect x="-9" y="-4" width="18" height="8" rx="3" fill="#9a96e8" transform="translate(-20,20) rotate(45)"/>
    <rect x="-9" y="-4" width="18" height="8" rx="3" fill="#9a96e8" transform="translate(20,20) rotate(-45)"/>
    <rect x="-23" y="-23" width="46" height="46" rx="9" fill="#f1f0fd" stroke="#9a96e8" stroke-width="2"/>
    <polygon points="0,-33 -6,-23 6,-23" fill="#9a96e8"/>
  </g>
  <text class="lbl" x="150" y="296" text-anchor="middle">start</text>

  <!-- target robot (facing right = 90 deg) -->
  <g transform="translate(470,110) rotate(90)">
    <rect x="-9" y="-4" width="18" height="8" rx="3" fill="#4640c4" transform="translate(-20,-20) rotate(-45)"/>
    <rect x="-9" y="-4" width="18" height="8" rx="3" fill="#4640c4" transform="translate(20,-20) rotate(45)"/>
    <rect x="-9" y="-4" width="18" height="8" rx="3" fill="#4640c4" transform="translate(-20,20) rotate(45)"/>
    <rect x="-9" y="-4" width="18" height="8" rx="3" fill="#4640c4" transform="translate(20,20) rotate(-45)"/>
    <rect x="-23" y="-23" width="46" height="46" rx="9" fill="#ecebfd" stroke="#5b54e6" stroke-width="2"/>
    <polygon points="0,-33 -6,-23 6,-23" fill="#4640c4"/>
  </g>
  <circle cx="470" cy="110" r="4" fill="#1f9d63"/>
  <text class="lbl" x="470" y="296" text-anchor="middle">target (x, y, &#952;)</text>
  <text class="sub" x="470" y="314" text-anchor="middle">arrives in position and pointed the right way</text>
</svg>
