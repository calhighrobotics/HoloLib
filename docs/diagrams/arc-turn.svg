<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 300" width="680" height="300" role="img" aria-label="curveCircle drives a circular arc of a given radius until the robot reaches a target heading">
  <style>
    text { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .lbl { font-size: 13px; fill: #20203c; font-weight: 600; }
    .sub { font-size: 12px; fill: #5a5a6e; }
    .note{ font-size: 12px; fill: #4640c4; font-weight: 600; }
    .dim { font-size: 12px; fill: #8888a0; }
  </style>
  <defs>
    <marker id="ac_mv" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5b54e6"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="678" height="298" rx="16" fill="#ffffff" stroke="#e7e6fb" stroke-width="2"/>
  <rect x="40" y="36" width="600" height="228" rx="10" fill="#f7f7fb" stroke="#dcdcec" stroke-width="1.6"/>

  <!-- center of arc -->
  <circle cx="430" cy="220" r="4" fill="#8888a0"/>
  <text class="dim" x="430" y="240" text-anchor="middle">center</text>

  <!-- radius line -->
  <line x1="430" y1="220" x2="250" y2="220" stroke="#8888a0" stroke-width="1.4" stroke-dasharray="5 5"/>
  <text class="dim" x="340" y="214" text-anchor="middle">radius</text>

  <!-- the arc path -->
  <path d="M250,220 A 180 180 0 0 1 430,40" fill="none" stroke="#5b54e6" stroke-width="3" stroke-dasharray="2 6" stroke-linecap="round" marker-end="url(#ac_mv)"/>

  <!-- start robot facing up -->
  <g transform="translate(250,220)" opacity="0.5">
    <rect x="-22" y="-22" width="44" height="44" rx="9" fill="#f1f0fd" stroke="#9a96e8" stroke-width="2"/>
    <polygon points="0,-32 -6,-22 6,-22" fill="#9a96e8"/>
  </g>
  <text class="sub" x="250" y="262" text-anchor="middle">start heading</text>

  <!-- end robot facing right (turned along the arc) -->
  <g transform="translate(430,40) rotate(90)">
    <rect x="-9" y="-4" width="18" height="8" rx="3" fill="#4640c4" transform="translate(-20,-20) rotate(-45)"/>
    <rect x="-9" y="-4" width="18" height="8" rx="3" fill="#4640c4" transform="translate(20,-20) rotate(45)"/>
    <rect x="-9" y="-4" width="18" height="8" rx="3" fill="#4640c4" transform="translate(-20,20) rotate(45)"/>
    <rect x="-9" y="-4" width="18" height="8" rx="3" fill="#4640c4" transform="translate(20,20) rotate(-45)"/>
    <rect x="-22" y="-22" width="44" height="44" rx="9" fill="#ecebfd" stroke="#5b54e6" stroke-width="2"/>
    <polygon points="0,-32 -6,-22 6,-22" fill="#4640c4"/>
  </g>
  <text class="note" x="500" y="70" text-anchor="middle">target heading</text>
</svg>
